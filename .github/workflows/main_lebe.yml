name: Lebe Backend CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: lebe-backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Validate Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile Python sources
        run: python -m compileall src

  docker-build:
    name: Verify Docker Build
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: lebe-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Deploy with Docker Compose over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          envs: DEPLOY_PATH
          script_stop: true
          script: |
            set -e
            DEPLOY_DIR="${DEPLOY_PATH:-/var/www/lebe-backend}"

            if [ ! -d "$DEPLOY_DIR" ]; then
              echo "Missing deploy directory: $DEPLOY_DIR"
              exit 1
            fi

            cd "$DEPLOY_DIR"

            if [ ! -f .env ]; then
              echo "Missing $DEPLOY_DIR/.env on server"
              exit 1
            fi

            git config --global --add safe.directory "$DEPLOY_DIR"
            git pull
            docker compose down || true
            docker compose up -d --build --remove-orphans
            docker compose ps
